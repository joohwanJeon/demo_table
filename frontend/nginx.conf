server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 정적 파일 서빙 + SPA 라우팅 (새로고침해도 404 안 나게)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api 로 시작하는 요청은 백엔드 K8s Service로 전달 (프록시)
    # team3-backend-svc = 백엔드 Service 이름 (K8s 배포 때 이 이름으로 맞춰야 함)
    location /api/ {
        proxy_pass http://team3-backend-svc:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
