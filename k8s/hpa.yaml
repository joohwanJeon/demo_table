# metrics-server가 클러스터에 설치되어 있어야 동작합니다.
# 설치: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reservation-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reservation-api
  minReplicas: 2                  # 평상시 2개
  maxReplicas: 5                  # 예약 오픈 부하 시 최대 5개까지
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # CPU 평균 70% 초과 시 스케일아웃
