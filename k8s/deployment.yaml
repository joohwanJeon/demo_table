apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-api
  labels:
    app: reservation-api
spec:
  replicas: 2                      # 기본 가용성 확보 (Self-Healing 시연 대상)
  selector:
    matchLabels:
      app: reservation-api
  strategy:
    type: RollingUpdate           # 무중단 배포 (RFP 롤링 업데이트 전략)
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: reservation-api
    spec:
      containers:
        - name: reservation-api
          # TODO: 본인 ECR 주소로 교체
          image: <ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/reservation-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              # TODO: 본인 RDS 엔드포인트로 교체
              value: "jdbc:mysql://<RDS_ENDPOINT>:3306/reservation?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
          # ★ HPA가 동작하려면 requests가 반드시 있어야 함 (CPU% 계산 기준) ★
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"     # Spring Boot(JVM)는 128Mi로는 못 뜸 → 넉넉히
            limits:
              cpu: "500m"
              memory: "768Mi"
          # Spring Boot는 기동이 느려서 initialDelay를 길게 잡아야 재시작 루프를 안 탐
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
